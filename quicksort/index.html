<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickSort Demo</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="card">
    <h1>QuickSort Demo</h1>
    <p>Enter comma-separated numbers (example: 5, 3, 8, 4, 2)</p>
    <input id="arrayInput" type="text" placeholder="e.g. 5, 3, 8, 4, 2" />
    <button id="sortButton">Sort</button>
    <p id="error" class="error"></p>
    <p><strong>Sorted result:</strong> <span id="result">-</span></p>
  </main>
  <script src="./app.js"></script>
</body>
</html>
